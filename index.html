<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For adeeeekkkkk ❤️</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e7);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
z-index:2;
width:92%;
max-width:360px;
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.22);
backdrop-filter:blur(14px);
color:#fff;
text-align:center;
box-shadow:0 0 30px rgba(255,70,140,.45);
}

img{
width:135px;
height:135px;
border-radius:50%;
border:4px solid #fff;
object-fit:cover;
margin-bottom:14px;
box-shadow:0 0 20px #fff;
}

h2{
margin:8px 0 12px;
}

p{
line-height:1.6;
}

button{
margin-top:22px;
padding:14px 34px;
border:none;
border-radius:50px;
background:#ff4f8b;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 20px #ff4f8b;
animation:pulse 1.3s infinite;
}

button:hover{
transform:scale(1.08);
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.heart,.spark{
position:fixed;
top:-30px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>

<body>

<div class="card">

<img src="https://files.catbox.moe/qhvr7n.jpg">

<h2>Adeeeeeeeeeeeek ❤️</h2>

<p>
Makasiiihhh yaaa udah hadir di hidup abaaaaaaaaaaangggg. 🤍
<br><br>
Kalau adeeeeeeeek capeeee, sediiih, atau ngerasa sendirian...
inget yaaa, abaaaaaaaaaaangggg bakal selalu ada buat adeeeeeeeek. 🫂💗
<br><br>
I Love You So Much ❤️
</p>

<button id="loveBtn">💗 Lup Lup 💗</button>

</div>

<audio id="music" loop>
<source src="https://files.catbox.moe/08no1l.mp3" type="audio/mpeg">
</audio>

<script>

const music=document.getElementById("music");
const btn=document.getElementById("loveBtn");

btn.onclick=function(){

music.play();

btn.innerHTML="💖 I Love You Adeeeeeeeeeeeek 💖";

for(let i=0;i<120;i++){

setTimeout(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"💖";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(18+Math.random()*22)+"px";

h.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},i*35);

}

};

setInterval(()=>{

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*18)+"px";

h.style.animationDuration=(5+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),7000);

},280);

setInterval(()=>{

let s=document.createElement("div");

s.className="spark";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";

s.style.fontSize=(10+Math.random()*10)+"px";

s.style.animationDuration=(6+Math.random()*3)+"s";

document.body.appendChild(s);

setTimeout(()=>s.remove(),8000);

},600);

</script>

</body>
</html>
